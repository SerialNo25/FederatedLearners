stage = "federated_training"
experiment_name = "federated_banks_1_2"
output_dir = "data/experiments"
model_config = "configs/shared/model.toml"

num_rounds = 8
proximal_mu = 0.003

institution_configs = [
    "configs/local_training/bank_1.toml",
    "configs/local_training/bank_2.toml",
]

# Optional: override local-training TOML values only when running federated training.
[local_training_overrides.bank_1]
local_epochs = 6
learning_rate = 0.003
fraud_weight = 8
batch_size = 1024
classification_threshold = 0.5

[local_training_overrides.bank_2]
local_epochs = 9
learning_rate = 0.006
fraud_weight = 14
batch_size = 1024
classification_threshold = 0.5