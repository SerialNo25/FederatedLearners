stage = "federated_training"
experiment_name = "federated_global"
output_dir = "data/experiments"
model_config = "configs/shared/model.toml"

num_rounds = 20
proximal_mu = 0.004

institution_configs = [
    "configs/local_training/bank_1.toml",
    "configs/local_training/bank_2.toml",
    "configs/local_training/bank_3.toml",
]

# Optional: override local-training TOML values only when running federated training.
[local_training_overrides.bank_1]
local_epochs = 3
learning_rate = 0.008
fraud_weight = 14
batch_size = 4096
classification_threshold = 0.5

[local_training_overrides.bank_2]
local_epochs = 4
learning_rate = 0.006
fraud_weight = 10
batch_size = 2048
classification_threshold = 0.5

[local_training_overrides.bank_3]
local_epochs = 10
learning_rate = 0.008
fraud_weight = 10
batch_size = 4096
classification_threshold = 0.5
