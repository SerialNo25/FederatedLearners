experiment_name = "federated_global"
output_dir = "data/experiments"
num_institutions = 3
num_rounds = 5
local_epochs = 5
learning_rate = 0.05
proximal_mu = 0.001

[model]
model_type = "tabnet" # must exist in domain/models/model_registry.py
decision_dim = 16
attention_dim = 16
steps = 3
relaxation_factor = 1.5
sparsity_weight = 0.0001
# Device is auto-selected by priority: CUDA > MPS > CPU

[[institutions]]
institution_id = "bank_1"
dataset_path = "configs/sample_data/bank_1.csv"

[[institutions]]
institution_id = "bank_2"
dataset_path = "configs/sample_data/bank_2.csv"

[[institutions]]
institution_id = "bank_3"
dataset_path = "configs/sample_data/bank_3.csv"
